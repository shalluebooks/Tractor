<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chauhan's Tractor - Book Tractor Services Easily</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .service-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }
        .btn-primary {
            background: linear-gradient(135deg, #16a34a 0%, #ea580c 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(22, 163, 74, 0.4);
        }
        .banner-slider {
            animation: slide 10s infinite;
        }
        @keyframes slide {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-100%); }
        }
        .loading-spinner {
            border: 4px solid #f3f4f6;
            border-top: 4px solid #16a34a;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Supabase Configuration
        const SUPABASE_URL = 'https://your-supabase-url.supabase.co';
        const SUPABASE_ANON_KEY = 'your-supabase-anon-key';

        let supabase = null;

        // Initialize Supabase
        const initSupabase = () => {
            if (!supabase && SUPABASE_URL !== 'https://your-supabase-url.supabase.co') {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        };

        // Mock Services Data
        const mockServices = [
            {
                id: '1',
                name: '🚜 Nangar Jutai',
                description: 'Soil preparation and plowing service',
                image_url: 'https://via.placeholder.com/300x200?text=Nangar+Jutai',
                price_type: 'per_acre',
                base_price: 500,
                status: 'active'
            },
            {
                id: '2',
                name: '🚜 Trolley Work',
                description: 'Transportation and trolley services',
                image_url: 'https://via.placeholder.com/300x200?text=Trolley+Work',
                price_type: 'per_trip',
                base_price: 800,
                status: 'active'
            },
            {
                id: '3',
                name: '🚜 Kurri Work',
                description: 'Harvesting and collection services',
                image_url: 'https://via.placeholder.com/300x200?text=Kurri+Work',
                price_type: 'per_acre',
                base_price: 600,
                status: 'active'
            },
            {
                id: '4',
                name: '🚜 Thresher Work',
                description: 'Threshing and grain separation',
                image_url: 'https://via.placeholder.com/300x200?text=Thresher+Work',
                price_type: 'per_ton',
                base_price: 1000,
                status: 'active'
            }
        ];

        // Home Page Component
        const HomePage = ({ onBookClick, onHistoryClick }) => {
            const [bannerIndex, setBannerIndex] = useState(0);

            useEffect(() => {
                const interval = setInterval(() => {
                    setBannerIndex((prev) => (prev + 1) % 3);
                }, 5000);
                return () => clearInterval(interval);
            }, []);

            const banners = [
                'https://via.placeholder.com/1200x300?text=Banner+1',
                'https://via.placeholder.com/1200x300?text=Banner+2',
                'https://via.placeholder.com/1200x300?text=Banner+3'
            ];

            return (
                <div className="min-h-screen bg-gradient-to-br from-green-50 to-orange-50">
                    {/* Header */}
                    <header className="bg-gradient-to-r from-green-700 to-orange-600 text-white shadow-lg">
                        <div className="max-w-6xl mx-auto px-4 py-6">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-3">
                                    <span className="text-4xl">🚜</span>
                                    <div>
                                        <h1 className="text-3xl font-bold">Chauhan's Tractor</h1>
                                        <p className="text-sm text-green-100">Book Tractor Services Easily</p>
                                    </div>
                                </div>
                                <button
                                    onClick={onHistoryClick}
                                    className="bg-white text-green-700 px-4 py-2 rounded-lg font-semibold hover:bg-green-100 transition"
                                >
                                    📋 My Bookings
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Banner Slider */}
                    <div className="max-w-6xl mx-auto px-4 py-6">
                        <div className="relative h-64 bg-gray-300 rounded-xl overflow-hidden shadow-lg">
                            <img
                                src={banners[bannerIndex]}
                                alt="Banner"
                                className="w-full h-full object-cover"
                            />
                            <div className="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex gap-2">
                                {banners.map((_, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => setBannerIndex(idx)}
                                        className={`w-3 h-3 rounded-full transition ${
                                            idx === bannerIndex ? 'bg-white' : 'bg-white/50'
                                        }`}
                                    />
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Search Bar */}
                    <div className="max-w-6xl mx-auto px-4 py-4">
                        <input
                            type="text"
                            placeholder="🔍 Search services..."
                            className="w-full px-6 py-3 rounded-lg border-2 border-green-300 focus:outline-none focus:border-green-600 shadow-md"
                        />
                    </div>

                    {/* Services Section */}
                    <div className="max-w-6xl mx-auto px-4 py-8">
                        <h2 className="text-3xl font-bold text-green-800 mb-6">Available Services</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            {mockServices.map((service) => (
                                <div
                                    key={service.id}
                                    className="service-card bg-white rounded-xl shadow-md overflow-hidden"
                                >
                                    <img
                                        src={service.image_url}
                                        alt={service.name}
                                        className="w-full h-40 object-cover"
                                    />
                                    <div className="p-4">
                                        <h3 className="text-lg font-bold text-gray-800">{service.name}</h3>
                                        <p className="text-sm text-gray-600 mb-3">{service.description}</p>
                                        <div className="flex justify-between items-center mb-3">
                                            <span className="text-green-700 font-bold">₹{service.base_price}</span>
                                            <span className="text-xs bg-orange-100 text-orange-700 px-2 py-1 rounded">
                                                {service.price_type}
                                            </span>
                                        </div>
                                        <button
                                            onClick={() => onBookClick(service)}
                                            className="btn-primary w-full text-white py-2 rounded-lg font-semibold"
                                        >
                                            Book Now
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Contact Section */}
                    <div className="max-w-6xl mx-auto px-4 py-8">
                        <div className="bg-white rounded-xl shadow-lg p-8">
                            <h2 className="text-2xl font-bold text-green-800 mb-6">Contact Us</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                <a
                                    href="tel:+919876543210"
                                    className="flex items-center gap-3 p-4 bg-green-50 rounded-lg hover:bg-green-100 transition"
                                >
                                    <span className="text-3xl">📞</span>
                                    <div>
                                        <p className="font-semibold text-gray-800">Call Owner</p>
                                        <p className="text-sm text-gray-600">+91 98765 43210</p>
                                    </div>
                                </a>
                                <a
                                    href="https://wa.me/919876543210"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="flex items-center gap-3 p-4 bg-green-50 rounded-lg hover:bg-green-100 transition"
                                >
                                    <span className="text-3xl">💬</span>
                                    <div>
                                        <p className="font-semibold text-gray-800">WhatsApp</p>
                                        <p className="text-sm text-gray-600">Chat with us</p>
                                    </div>
                                </a>
                                <button
                                    onClick={() => navigator.share({ title: "Chauhan's Tractor", text: "Book tractor services easily!" })}
                                    className="flex items-center gap-3 p-4 bg-green-50 rounded-lg hover:bg-green-100 transition"
                                >
                                    <span className="text-3xl">📤</span>
                                    <div>
                                        <p className="font-semibold text-gray-800">Share App</p>
                                        <p className="text-sm text-gray-600">Tell your friends</p>
                                    </div>
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Footer */}
                    <footer className="bg-gray-800 text-white py-8 mt-12">
                        <div className="max-w-6xl mx-auto px-4 text-center">
                            <p className="mb-2">&copy; 2024 Chauhan's Tractor. All rights reserved.</p>
                            <div className="flex justify-center gap-4 text-sm">
                                <a href="#" className="hover:text-green-400">Privacy Policy</a>
                                <a href="#" className="hover:text-green-400">Terms & Conditions</a>
                                <a href="#" className="hover:text-green-400">About Us</a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        // Booking Form Component
        const BookingForm = ({ service, onSubmit, onCancel }) => {
            const [formData, setFormData] = useState({
                customerName: '',
                customerMobile: '',
                village: '',
                address: '',
                latitude: '',
                longitude: '',
                bookingDate: '',
                bookingTime: '',
                area: '',
                notes: ''
            });

            const [estimatedPrice, setEstimatedPrice] = useState(0);

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));

                if (name === 'area' && value) {
                    setEstimatedPrice(service.base_price * parseFloat(value));
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit({ ...formData, serviceId: service.id, estimatedPrice });
            };

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                        <div className="sticky top-0 bg-gradient-to-r from-green-700 to-orange-600 text-white p-6 flex justify-between items-center">
                            <h2 className="text-2xl font-bold">Book {service.name}</h2>
                            <button onClick={onCancel} className="text-2xl hover:opacity-80">✕</button>
                        </div>

                        <form onSubmit={handleSubmit} className="p-6 space-y-4">
                            {/* Customer Details */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Full Name *</label>
                                    <input
                                        type="text"
                                        name="customerName"
                                        value={formData.customerName}
                                        onChange={handleChange}
                                        required
                                        className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
                                        placeholder="Your name"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Mobile Number *</label>
                                    <input
                                        type="tel"
                                        name="customerMobile"
                                        value={formData.customerMobile}
                                        onChange={handleChange}
                                        required
                                        className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
                                        placeholder="10-digit mobile"
                                    />
                                </div>
                            </div>

                            {/* Location Details */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Village *</label>
                                    <input
                                        type="text"
                                        name="village"
                                        value={formData.village}
                                        onChange={handleChange}
                                        required
                                        className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
                                        placeholder="Village name"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Address *</label>
                                    <input
                                        type="text"
                                        name="address"
                                        value={formData.address}
                                        onChange={handleChange}
                                        required
                                        className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
                                        placeholder="Full address"
                                    />
                                </div>
                            </div>

                            {/* Coordinates */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Latitude *</label>
                                    <input
                                        type="number"
                                        name="latitude"
                                        value={formData.latitude}
                                        onChange={handleChange}
                                        required
                                        step="0.0001"
                                        className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
                                        placeholder="e.g., 28.6139"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Longitude *</label>
                                    <input
                                        type="number"
                                        name="longitude"
                                        value={formData.longitude}
                                        onChange={handleChange}
                                        required
                                        step="0.0001"
                                        className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
                                        placeholder="e.g., 77.2090"
                                    />
                                </div>
                            </div>

                            {/* Booking Date & Time */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Booking Date *</label>
                                    <input
                                        type="date"
                                        name="bookingDate"
                                        value={formData.bookingDate}
                                        onChange={handleChange}
                                        required
                                        className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Booking Time *</label>
                                    <input
                                        type="time"
                                        name="bookingTime"
                                        value={formData.bookingTime}
                                        onChange={handleChange}
                                        required
                                        className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
                                    />
                                </div>
                            </div>

                            {/* Area */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">Area (Acre/Bigha) *</label>
                                <input
                                    type="number"
                                    name="area"
                                    value={formData.area}
                                    onChange={handleChange}
                                    required
                                    step="0.1"
                                    className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
                                    placeholder="e.g., 2.5"
                                />
                            </div>

                            {/* Notes */}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">Additional Notes</label>
                                <textarea
                                    name="notes"
                                    value={formData.notes}
                                    onChange={handleChange}
                                    className="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
                                    placeholder="Any special instructions..."
                                    rows="3"
                                />
                            </div>

                            {/* Estimated Price */}
                            <div className="bg-green-50 p-4 rounded-lg">
                                <p className="text-sm text-gray-600">Estimated Price</p>
                                <p className="text-3xl font-bold text-green-700">₹{estimatedPrice.toFixed(2)}</p>
                            </div>

                            {/* Buttons */}
                            <div className="flex gap-4 pt-4">
                                <button
                                    type="button"
                                    onClick={onCancel}
                                    className="flex-1 px-6 py-3 border-2 border-gray-300 rounded-lg font-semibold text-gray-700 hover:bg-gray-50"
                                >
                                    Cancel
                                </button>
                                <button
                                    type="submit"
                                    className="flex-1 btn-primary px-6 py-3 text-white rounded-lg font-semibold"
                                >
                                    Confirm Booking
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        // Booking Success Component
        const BookingSuccess = ({ booking, onClose }) => {
            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-xl shadow-2xl max-w-md w-full text-center p-8">
                        <div className="text-6xl mb-4">✅</div>
                        <h2 className="text-2xl font-bold text-green-700 mb-2">Booking Confirmed!</h2>
                        <p className="text-gray-600 mb-6">Your tractor service has been booked successfully.</p>
                        
                        <div className="bg-gray-50 rounded-lg p-4 mb-6 text-left">
                            <div className="flex justify-between mb-2">
                                <span className="text-gray-600">Booking ID:</span>
                                <span className="font-semibold text-gray-800">{booking.id}</span>
                            </div>
                            <div className="flex justify-between mb-2">
                                <span className="text-gray-600">Status:</span>
                                <span className="font-semibold text-yellow-600">Pending</span>
                            </div>
                            <div className="flex justify-between">
                                <span className="text-gray-600">Amount:</span>
                                <span className="font-semibold text-green-700">₹{booking.estimatedPrice}</span>
                            </div>
                        </div>

                        <p className="text-sm text-gray-600 mb-6">
                            We will contact you shortly to confirm the booking. You can track your booking using your mobile number.
                        </p>

                        <button
                            onClick={onClose}
                            className="btn-primary w-full text-white py-3 rounded-lg font-semibold"
                        >
                            Back to Home
                        </button>
                    </div>
                </div>
            );
        };

        // Booking History Component
        const BookingHistory = ({ onClose }) => {
            const [bookings, setBookings] = useState([]);
            const [mobileNumber, setMobileNumber] = useState('');
            const [searched, setSearched] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleSearch = async (e) => {
                e.preventDefault();
                setLoading(true);
                setSearched(true);

                // Simulate API call
                setTimeout(() => {
                    setBookings([
                        {
                            id: 'BK001',
                            customerName: 'Raj Kumar',
                            service: '🚜 Nangar Jutai',
                            bookingDate: '2024-01-15',
                            status: 'completed',
                            estimatedPrice: 1250
                        },
                        {
                            id: 'BK002',
                            customerName: 'Raj Kumar',
                            service: '🚜 Trolley Work',
                            bookingDate: '2024-01-20',
                            status: 'pending',
                            estimatedPrice: 1600
                        }
                    ]);
                    setLoading(false);
                }, 1000);
            };

            const getStatusColor = (status) => {
                switch (status) {
                    case 'completed': return 'bg-green-100 text-green-700';
                    case 'pending': return 'bg-yellow-100 text-yellow-700';
                    case 'cancelled': return 'bg-red-100 text-red-700';
                    default: return 'bg-gray-100 text-gray-700';
                }
            };

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                        <div className="sticky top-0 bg-gradient-to-r from-green-700 to-orange-600 text-white p-6 flex justify-between items-center">
                            <h2 className="text-2xl font-bold">My Bookings</h2>
                            <button onClick={onClose} className="text-2xl hover:opacity-80">✕</button>
                        </div>

                        <div className="p-6">
                            {!searched ? (
                                <form onSubmit={handleSearch} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">
                                            Enter Mobile Number to View Bookings
                                        </label>
                                        <div className="flex gap-2">
                                            <input
                                                type="tel"
                                                value={mobileNumber}
                                                onChange={(e) => setMobileNumber(e.target.value)}
                                                required
                                                className="flex-1 px-4 py-2 border-2 border-gray-300 rounded-lg focus:outline-none focus:border-green-600"
                                                placeholder="10-digit mobile number"
                                            />
                                            <button
                                                type="submit"
                                                className="btn-primary px-6 py-2 text-white rounded-lg font-semibold"
                                            >
                                                Search
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            ) : loading ? (
                                <div className="flex justify-center py-8">
                                    <div className="loading-spinner"></div>
                                </div>
                            ) : bookings.length > 0 ? (
                                <div className="space-y-4">
                                    {bookings.map((booking) => (
                                        <div key={booking.id} className="border-2 border-gray-200 rounded-lg p-4 hover:border-green-400 transition">
                                            <div className="flex justify-between items-start mb-3">
                                                <div>
                                                    <p className="font-semibold text-gray-800">{booking.service}</p>
                                                    <p className="text-sm text-gray-600">ID: {booking.id}</p>
                                                </div>
                                                <span className={`px-3 py-1 rounded-full text-sm font-semibold ${getStatusColor(booking.status)}`}>
                                                    {booking.status.charAt(0).toUpperCase() + booking.status.slice(1)}
                                                </span>
                                            </div>
                                            <div className="grid grid-cols-2 gap-2 text-sm text-gray-600">
                                                <div>Date: {booking.bookingDate}</div>
                                                <div>Amount: ₹{booking.estimatedPrice}</div>
                                            </div>
                                            <button className="mt-3 w-full px-4 py-2 border-2 border-green-600 text-green-600 rounded-lg hover:bg-green-50 font-semibold transition">
                                                View Details
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="text-center py-8">
                                    <p className="text-gray-600 mb-4">No bookings found for this mobile number.</p>
                                    <button
                                        onClick={() => setSearched(false)}
                                        className="text-green-600 font-semibold hover:text-green-700"
                                    >
                                        Try another number
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [currentPage, setCurrentPage] = useState('home');
            const [selectedService, setSelectedService] = useState(null);
            const [lastBooking, setLastBooking] = useState(null);

            const handleBookClick = (service) => {
                setSelectedService(service);
                setCurrentPage('booking');
            };

            const handleBookingSubmit = (bookingData) => {
                const booking = {
                    id: `BK${Date.now()}`,
                    ...bookingData,
                    status: 'pending',
                    createdAt: new Date().toISOString()
                };
                setLastBooking(booking);
                setCurrentPage('success');
                setSelectedService(null);
            };

            const handleHistoryClick = () => {
                setCurrentPage('history');
            };

            return (
                <div>
                    {currentPage === 'home' && (
                        <HomePage onBookClick={handleBookClick} onHistoryClick={handleHistoryClick} />
                    )}
                    {currentPage === 'booking' && selectedService && (
                        <BookingForm
                            service={selectedService}
                            onSubmit={handleBookingSubmit}
                            onCancel={() => setCurrentPage('home')}
                        />
                    )}
                    {currentPage === 'success' && lastBooking && (
                        <BookingSuccess
                            booking={lastBooking}
                            onClose={() => setCurrentPage('home')}
                        />
                    )}
                    {currentPage === 'history' && (
                        <BookingHistory onClose={() => setCurrentPage('home')} />
                    )}
                </div>
            );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
